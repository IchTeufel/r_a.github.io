<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабараторная №3</title>
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --card: #fff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: #0f172a; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav a { color: var(--primary); text-decoration: none; font-weight: 600; padding: 8px 16px; background: var(--card); border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .nav a:hover { background: var(--primary); color: #fff; }
        section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, button { padding: 10px; margin: 6px 0; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        button { background: var(--primary); color: #fff; cursor: pointer; border: none; font-weight: 500; }
        button:hover { opacity: 0.9; }
        #surnameTarget { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Навигация -->
        <nav class="nav">
            <span>🏠 Лабораторная №3</span>
            <!-- 🔗 Ссылка на страницу резюме -->
            <a href="resume.html">📄 Открыть резюме</a>
        </nav>

        <h1>Аглитдинов Ростислав</h1>
        <img src="https://via.placeholder.com/150" alt="Фото профиля" style="border-radius: 12px; margin-bottom: 20px;">

        <section>
            <h3>Работа с числами</h3>
            <label>Число 1: <input type="number" id="num1"></label><br>
            <label>Число 2: <input type="number" id="num2"></label><br>
            <button onclick="showResult('min')">Найти минимум</button>
            <button onclick="showResult('max')">Найти максимум</button>
            <button onclick="showResult('eq')">Проверить равенство</button>
            <p id="numberResult" style="margin-top: 10px; font-weight: 500;"></p>
        </section>

        <section>
            <h3>Админ</h3>
            <button onclick="alert('Имя пользователя: admin')">Показать имя admin</button>
        </section>

        <section>
            <h3>Подтвердите возраст</h3>
            <button onclick="promptAge()">Указать возраст</button>
        </section>

        <section>
            <h3>Изменить текст фамилии</h3>
            <p>Текущая фамилия: <span id="surnameTarget">Аглитдинов</span></p>
            <label>Новая фамилия: <input type="text" id="newSurname"></label>
            <button onclick="changeSurname()">Изменить фамилию</button>
        </section>

        <section>
            <h3>Изменить цвет фона</h3>
            <button onclick="changeBg()">Изменить цвет фона</button>
        </section>

        <section>
            <h3>Анкета</h3>
            <form onsubmit="event.preventDefault(); alert('Анкета отправлена!'); this.reset();">
                <label>ФИО: <input type="text" required></label><br>
                <label>Возраст: <input type="number" required></label><br>
                <label>Пол: <input type="radio" name="gender" value="М">М <input type="radio" name="gender" value="Ж">Ж</label><br>
                <label><input type="checkbox" required> Я согласен с условиями</label><br>
                <button type="submit">Отправить анкету</button>
            </form>
        </section>
    </div>

    <script>
        // Базовый функционал для лабораторной
        function showResult(type) {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            const res = document.getElementById('numberResult');
            if (isNaN(n1) || isNaN(n2)) { res.textContent = 'Введите оба числа!'; return; }
            if (type === 'min') res.textContent = `Минимум: ${Math.min(n1, n2)}`;
            if (type === 'max') res.textContent = `Максимум: ${Math.max(n1, n2)}`;
            if (type === 'eq') res.textContent = n1 === n2 ? 'Числа равны' : 'Числа не равны';
        }
        function promptAge() { alert('Ваш возраст: ' + prompt('Укажите ваш возраст:')); }
        function changeSurname() {
            const val = document.getElementById('newSurname').value.trim();
            if (val) document.getElementById('surnameTarget').textContent = val;
        }
        const colors = ['#f8fafc', '#fef3c7', '#ecfdf5', '#eff6ff', '#fdf2f8'];
        let ci = 0;
        function changeBg() { document.body.style.backgroundColor = colors[ci++ % colors.length]; }
    </script>
</body>
</html>
